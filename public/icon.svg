  <defs>
    <linearGradient id="mlg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B95FF"/>
      <stop offset="55%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#8B5BFF"/>
    </linearGradient>
    <linearGradient id="mlg2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A6BFF"/>
