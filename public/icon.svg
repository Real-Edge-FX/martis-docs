    </linearGradient>
  </defs>
  <path d="M16 3 L28 9 L28 23 L16 29 L4 23 L4 9 Z" fill="url(#mlg)" opacity=".15"/>
  <path d="M16 3 L28 9 L16 15 L4 9 Z" fill="url(#mlg)"/>
