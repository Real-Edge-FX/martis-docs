name: Deploy docs

# Build the Vite + React + MDX docs site directly on the self-hosted
# runner at /home/martis/martis-docs and rsync `dist/` into the path
# Caddy serves on port 3000. The external reverse proxy (Nginx Proxy
# Manager) maps that to https://martis-docs.realedgefx.com. No extra
# deploy step is needed: building in place IS the deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time; queued runs cancel any in-flight build
# so the latest commit always wins without piling up jobs.
concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish dist/
    runs-on: [self-hosted, linux, x64, martis-docs]
    timeout-minutes: 10

    # The runner already lives in /home/martis/martis-docs. We deploy
    # by building IN that working directory, so the action checks out
    # into the same path Caddy reads from.
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Activate Node 22 from nvm
        # The runner host has nvm installed under /home/martis/.nvm
        # with v22 already provisioned. Sourcing nvm here keeps the
        # toolchain in lockstep with the manual build path used during
        # initial setup.
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          nvm use 22
          {
            echo "PATH=$PATH"
            echo "NVM_BIN=$NVM_BIN"
          } >> "$GITHUB_ENV"
          node --version
          pnpm --version || npm i -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm build

      - name: SPA fallback (404.html)
        # The site is a client-rendered SPA — every URL must boot from
        # /index.html. Caddy's file_server falls back to /404.html for
        # any path it cannot match, so we ship a copy of index.html
        # under that name. (The Caddyfile on the host should also have
        # `try_files {path} /index.html`, but 404.html is a robust
        # safety net that works even with a default file_server.)
        run: cp dist/index.html dist/404.html

      - name: Publish to Caddy root
        # The runner checks out into _work/<repo>/<repo>. Caddy serves
        # /home/martis/martis-docs/dist. We sync the freshly built
        # dist/ into that path atomically (rsync --delete) so the
        # cutover is instant and stale assets are pruned.
        run: |
          set -euo pipefail
          TARGET=/home/martis/martis-docs/dist
          mkdir -p "$TARGET"
          rsync -a --delete dist/ "$TARGET/"
          echo "Published $(find "$TARGET" -type f | wc -l) files to $TARGET"

      - name: Smoke test
        run: |
          set -euo pipefail
          for path in / /docs /docs/getting-started/installation /search-index.json; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:3000${path}")
            if [ "$code" != "200" ]; then
              echo "::error::Caddy returned HTTP $code on $path"
              exit 1
            fi
            echo "OK ${path} → HTTP 200"
          done
